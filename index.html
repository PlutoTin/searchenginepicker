<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Selector</title>
  <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans">
  <div class="container mx-auto px-4 py-8">
    <h1 class="text-4xl font-bold text-gray-800 mb-8">Website Selector</h1>
    <form id="searchForm" action="#" class="flex flex-col md:flex-row md:items-center md:justify-center">
      <input type="text" name="q" placeholder="Search for a website" class="w-full md:w-auto md:mr-4 p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      <select name="search_engine" class="w-full md:w-auto md:mr-4 p-2 border border-gray-300 rounded-lg">
        <option value="example1">Google</option>
        <option value="example2">Bing</option>
        <option value="example3">DuckDuckGo</option>
        <option value="example4">Yahoo</option>
      </select>
      <button type="submit" class="w-full md:w-auto p-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 focus:outline-none">Search</button>
    </form>
    <footer class="mt-8 text-center text-gray-500">
      <p>Made with ❤️ by your favorite designer</p>
    </footer>
  </div>

  <script>
    // Handle form submission
    const searchForm = document.getElementById('searchForm');
    searchForm.addEventListener('submit', (event) => {
      event.preventDefault();

      const searchQuery = encodeURIComponent(searchForm.querySelector('input[name="q"]').value);
      const searchEngine = searchForm.querySelector('select[name="search_engine"]').value;

      // Redirect to different URLs based on selected search engine
      switch (searchEngine) {
        case 'example1':
          window.location.href = `https://google.com/search?q=${searchQuery}`;
          break;
        case 'example2':
          window.location.href = `https://bing.com/search?q=${searchQuery}`;
          break;
        case 'example3':
          window.location.href = `https://duckduckgo.com/search?q=${searchQuery}`;
          break;
        case 'example4':
          window.location.href = `https://yahoo.com/search?q=${searchQuery}`;
          break;
      }
    });
  </script>
</body>
</html>
